  <main>
    <section class="hero">
      <h1>Schick uns ein Rauchzeichen!</h1>
      <p>Brüll uns an oder wirf eine Steintafel ein – wir antworten blitzschnell.</p>
    </section>

    <section>
      <h2>Nachricht ins Nest werfen</h2>
      <form>
        <label for="name">Dein Sauriername *</label>
        <input type="text" id="name" required>

        <label for="email">Urzeit-Mailadresse *</label>
        <input type="email" id="email" required>

        <label for="message">Deine Brüllnachricht *</label>
        <textarea id="message" required></textarea>

        <button type="submit" class="btn">Abschicken</button>
      </form>
    </section>
